<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>02 – Particle Vortex</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
canvas{display:block}
.lbl{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font:600 10px/1 sans-serif;letter-spacing:.14em;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="lbl">02 — Particle Spiral Vortex</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Pool of particles — no alloc in loop
const NUM = 2800;
const particles = Array.from({length: NUM}, () => ({}));

function reset(p, randomRadius) {
  const R = Math.min(W, H) * .44;
  p.angle    = Math.random() * Math.PI * 2;
  p.r        = randomRadius ? Math.min(W,H)*.055*1.2 + Math.random() * (R - Math.min(W,H)*.055*1.5)
                             : R * (.65 + Math.random() * .35);
  p.angSpeed = .002 + Math.random() * .003;
  p.radSpeed = .00045 + Math.random() * .00055;
  p.size     = .35 + Math.random() * 2.0;
  p.bright   = .4 + Math.random() * .6;
}

particles.forEach(p => reset(p, true));

let t = 0;

function frame() {
  t += .008;
  const cx = W * .5, cy = H * .5;
  const rs = Math.min(W, H) * .055;
  const maxR = Math.min(W, H) * .44;

  // Trail — semi-transparent fill creates motion blur effect
  ctx.fillStyle = 'rgba(2,4,6,.18)';
  ctx.fillRect(0, 0, W, H);

  particles.forEach(p => {
    // How close to the event horizon (0=outer edge, 1=event horizon)
    const heat = Math.pow(Math.max(0, 1 - (p.r - rs) / (maxR - rs)), 1.4);

    // Accelerate as matter falls inward
    p.angSpeed = .0025 + heat * .032;
    p.r -= p.radSpeed * (1 + heat * 5.5);
    p.angle += p.angSpeed;

    // Elliptical orbit (accretion disc perspective)
    const px = cx + Math.cos(p.angle) * p.r;
    const py = cy + Math.sin(p.angle) * p.r * .44;

    // Temperature color: white-blue (cold outer) → orange → deep red (hot inner)
    const rC = 255;
    const gC = Math.round(230 - heat * 210);
    const bC = Math.round(255 - heat * 255);
    const alpha = p.bright * Math.min(heat * 2 + .1, 1);

    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${rC},${gC},${bC},${alpha})`;
    ctx.shadowBlur   = p.size * 12 * heat;
    ctx.shadowColor  = `rgba(${rC},${gC},${bC},.7)`;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Recycle when swallowed
    if (p.r <= rs * 1.08) reset(p, false);
  });

  // Photon ring pulse
  ctx.save();
  ctx.shadowBlur    = 28;
  ctx.shadowColor   = `rgba(255,200,60,.95)`;
  ctx.strokeStyle   = `rgba(255,240,130,${.82 + Math.sin(t*2.1)*.14})`;
  ctx.lineWidth     = 2.2;
  ctx.beginPath(); ctx.arc(cx, cy, rs * 1.06, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();

  // Black hole — pure void
  const sg = ctx.createRadialGradient(cx, cy, 0, cx, cy, rs);
  sg.addColorStop(0, '#000'); sg.addColorStop(1, '#000');
  ctx.beginPath(); ctx.arc(cx, cy, rs, 0, Math.PI * 2);
  ctx.fillStyle = sg; ctx.fill();

  requestAnimationFrame(frame);
}

frame();
</script>
</body>
</html>
